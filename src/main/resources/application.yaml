server:
  port: 8080

spring:
  application:
    name: api_clima

  datasource:
    url: jdbc:mysql://localhost:3306/db_clima?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

api:
  openweathermap:
    key: ${WEATHER_API_KEY}
    base-url: https://api.openweathermap.org/data/2.5/weather